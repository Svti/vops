# ========== 按环境常改的配置（极少修改的默认值在 VopsApplication 中） ==========
server.port=18080

# 数据源
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/vops?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
spring.datasource.username=root
spring.datasource.password=root

# 邮件（告警通知）
spring.mail.host=smtp.example.com
spring.mail.port=587
spring.mail.username=alert@example.com
spring.mail.password=your-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# OIDC 登录（可选）
oidc.enabled=true
oidc.issuer-uri=https://idaas.domain.com/oidc/client_xxxx
oidc.client-id=client_xxxx
oidc.client-secret=secret_key
oidc.redirect-uri=https://vops.domain.com/login/oidc/callback
oidc.scope=openid profile email
oidc.success-url=/

