<#-- 主机分组表单：fragment=true 时仅输出表单（弹窗用） -->
<#macro groupForm>
<div class="space-y-4">
    <form id="groupFormModal" method="post" action="/host/group/save" class="space-y-4">
        <#if group.id??>
        <input type="hidden" name="id" value="${group.id!}">
        </#if>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">分组名称 <span class="text-rose-500">*</span></label>
            <input type="text" name="name" value="${(group.name!)?html}" required maxlength="64" placeholder="如：生产环境、测试组" class="w-full px-3 py-2 bg-white border border-slate-300 rounded-lg text-slate-800 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">描述</label>
            <textarea name="description" rows="2" maxlength="255" placeholder="选填" class="w-full px-3 py-2 bg-white border border-slate-300 rounded-lg text-slate-800 focus:ring-2 focus:ring-blue-500">${(group.description!)?html}</textarea>
        </div>
        <div class="flex gap-3 pt-2">
            <button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition">保存</button>
            <a href="/host/group" class="js-modal-close px-4 py-2 text-slate-600 hover:text-slate-800 transition cursor-pointer">取消</a>
        </div>
    </form>
</div>
</#macro>
<#if fragment!false>
<@groupForm/>
<#else>
<#import "../../layout.html" as layout>
<@layout.main title=(group.id??)?then("编辑分组","新增分组") nav="host">
    <div class="max-w-xl mx-auto">
        <div class="bg-white border border-slate-200 rounded-xl p-6 shadow-sm">
            <h2 class="text-lg font-semibold text-slate-800 mb-4"><#if group.id??>编辑分组<#else>新增分组</#if></h2>
            <@groupForm/>
        </div>
    </div>
</@layout.main>
</#if>
