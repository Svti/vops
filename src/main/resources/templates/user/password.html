<#import "../layout.html" as layout>
<@layout.main title="修改密码" nav="user">
    <div class="max-w-md mx-auto">
        <h1 class="text-sm font-semibold text-slate-600 uppercase tracking-wider mb-6">修改密码</h1>
        <#if success??>
        <div class="mb-4 px-4 py-3 rounded-xl bg-green-50 border border-green-200 text-green-800 text-sm">${success}</div>
        </#if>
        <#if error??>
        <div class="mb-4 px-4 py-3 rounded-xl bg-red-50 border border-red-200 text-red-700 text-sm">${error}</div>
        </#if>
        <div class="bg-white border border-slate-200 rounded-xl shadow-sm p-6">
            <form method="post" action="/user/password" class="space-y-5">
                <div>
                    <label for="oldPassword" class="block text-sm font-medium text-slate-700 mb-1.5">原密码</label>
                    <input id="oldPassword" name="oldPassword" type="password" required autocomplete="current-password"
                           class="w-full px-4 py-2.5 rounded-lg bg-white border border-slate-300 text-slate-800 placeholder-slate-400 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                </div>
                <div>
                    <label for="newPassword" class="block text-sm font-medium text-slate-700 mb-1.5">新密码</label>
                    <input id="newPassword" name="newPassword" type="password" required minlength="6" autocomplete="new-password"
                           class="w-full px-4 py-2.5 rounded-lg bg-white border border-slate-300 text-slate-800 placeholder-slate-400 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                           placeholder="至少 6 位">
                </div>
                <div>
                    <label for="confirmPassword" class="block text-sm font-medium text-slate-700 mb-1.5">确认新密码</label>
                    <input id="confirmPassword" name="confirmPassword" type="password" required minlength="6" autocomplete="new-password"
                           class="w-full px-4 py-2.5 rounded-lg bg-white border border-slate-300 text-slate-800 placeholder-slate-400 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                </div>
                <div class="flex gap-3 pt-1">
                    <button type="submit" class="px-5 py-2.5 rounded-lg bg-blue-600 text-white font-medium text-sm hover:bg-blue-700 focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition">保存</button>
                    <a href="/" class="px-5 py-2.5 rounded-lg border border-slate-300 text-slate-700 font-medium text-sm hover:bg-slate-50 transition">取消</a>
                </div>
            </form>
        </div>
    </div>
</@layout.main>
