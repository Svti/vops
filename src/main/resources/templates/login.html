<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登录 - JSch OPS</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <script src="https://registry.npmmirror.com/tailwindcss-cdn/3.4.10/files/tailwindcss.js"></script>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center p-4 font-sans text-slate-800">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-lg border border-slate-200 p-8">
            <div class="text-center mb-8">
                <img src="/logo.svg" alt="JSch OPS" class="h-12 w-auto mx-auto mb-3">
                <p class="text-slate-500 text-sm">企业级 Linux 集群运维平台</p>
            </div>
            <#if error??>
            <div class="mb-4 px-4 py-3 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm">${error}</div>
            </#if>
            <form method="post" action="/login" class="space-y-5">
                <div>
                    <label for="username" class="block text-sm font-medium text-slate-700 mb-1.5">用户名</label>
                    <input id="username" name="username" type="text" required autofocus
                           class="w-full px-4 py-2.5 rounded-lg bg-white border border-slate-300 text-slate-800 placeholder-slate-400 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 mb-1.5">密码</label>
                    <input id="password" name="password" type="password" required
                           class="w-full px-4 py-2.5 rounded-lg bg-white border border-slate-300 text-slate-800 placeholder-slate-400 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                </div>
                <div>
                    <label for="captchaAnswer" class="block text-sm font-medium text-slate-700 mb-1.5">验证码</label>
                    <div class="flex items-center gap-3">
                        <span class="flex-shrink-0 px-4 py-2.5 rounded-lg bg-slate-100 border border-slate-200 text-blue-600 font-mono font-semibold select-none">${captchaQuestion!''}</span>
                        <input id="captchaAnswer" name="captchaAnswer" type="text" inputmode="numeric" pattern="[0-9]*" required
                               placeholder="请输入结果" maxlength="3" autocomplete="off"
                               class="flex-1 px-4 py-2.5 rounded-lg bg-white border border-slate-300 text-slate-800 placeholder-slate-400 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                    </div>
                </div>
                <div class="flex items-center">
                    <input id="rememberMe" name="rememberMe" type="checkbox" value="true"
                           class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                    <label for="rememberMe" class="ml-2 text-sm text-slate-600">记住我</label>
                </div>
                <button type="submit"
                        class="w-full py-3 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-medium shadow shadow-blue-500/30 focus:ring-2 focus:ring-blue-400 focus:ring-offset-2 focus:ring-offset-white transition">
                    登录
                </button>
            </form>
            <#if oidcEnabled!false>
            <div class="mt-6 pt-6 border-t border-slate-200 text-center">
                <a href="/login/oidc" class="text-sm text-blue-600 hover:text-blue-700">企业统一认证</a>
            </div>
            </#if>
        </div>
        <p class="text-center text-slate-500 text-xs mt-6">登录即表示您同意使用本系统进行运维操作</p>
    </div>
</body>
</html>
