<#import "../layout.html" as layout>
<@layout.main title=(key.id??)?then("编辑私钥","新增私钥") nav="sshkey">
    <div class="max-w-xl mx-auto">
        <div class="bg-white border border-slate-200 rounded-xl p-6 shadow-sm">
            <h1 class="text-lg font-semibold text-slate-800 uppercase tracking-wider mb-6"><#if key.id??>编辑<#else>新增</#if>私钥</h1>
            <form method="post" action="/sshkey/save" class="space-y-4">
                <#if key.id??><input type="hidden" name="id" value="${key.id}"></#if>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">名称</label>
                    <input type="text" name="name" value="${key.name!''}" required placeholder="如：公司跳板机" class="w-full px-3 py-2 bg-white border border-slate-300 rounded-lg text-slate-800 placeholder-slate-400 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">私钥内容 <span class="text-slate-500 font-normal">(编辑时留空表示不修改)</span></label>
                    <textarea name="content" rows="8" placeholder="粘贴 PEM 格式私钥（-----BEGIN ... -----END ...）" class="w-full px-3 py-2 bg-white border border-slate-300 rounded-lg text-slate-800 placeholder-slate-400 focus:ring-2 focus:ring-blue-500 font-mono text-sm"><#if key.content??>${key.content}</#if></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">备注</label>
                    <input type="text" name="description" value="${key.description!''}" placeholder="可选" class="w-full px-3 py-2 bg-white border border-slate-300 rounded-lg text-slate-800 placeholder-slate-400 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg shadow shadow-blue-500/30 transition">保存</button>
                    <a href="/sshkey" class="px-4 py-2 text-slate-600 hover:text-slate-800 transition">取消</a>
                </div>
            </form>
        </div>
    </div>
</@layout.main>
